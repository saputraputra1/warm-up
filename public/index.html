<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Warm-Up Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }
        
        .main-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .panel h2 {
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .account-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .account-name {
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .qr-container {
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .qr-code {
            font-family: monospace;
            font-size: 12px;
            line-height: 1.2;
            letter-spacing: 2px;
            background: white;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-danger {
            background: #e53e3e;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c53030;
        }
        
        .btn-success {
            background: #48bb78;
            color: white;
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        .contact-form {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .contact-form input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .contacts-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .contact-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .contact-info {
            flex: 1;
        }
        
        .contact-name {
            font-weight: 500;
        }
        
        .contact-number {
            font-size: 0.85em;
            color: #666;
        }
        
        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }
        
        .badge.replied {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .badge.pending {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .logs-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-time {
            color: #858585;
        }
        
        .log-success {
            color: #4ec9b0;
        }
        
        .log-error {
            color: #f48771;
        }
        
        .log-warn {
            color: #dcdcaa;
        }
        
        .control-buttons {
            margin-top: 15px;
        }
        
        @media (max-width: 768px) {
            .main-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 WhatsApp Warm-Up Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Pesan Hari Ini</h3>
                <div class="value" id="messagesSent">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Kontak</h3>
                <div class="value" id="totalContacts">0</div>
            </div>
            <div class="stat-card">
                <h3>Akun Aktif</h3>
                <div class="value" id="activeAccounts">0</div>
            </div>
            <div class="stat-card">
                <h3>Status Sistem</h3>
                <div class="value" style="color: #48bb78;">● AKTIF</div>
            </div>
        </div>
        
        <div class="main-panel">
            <div class="panel">
                <h2>🔐 Manajemen Akun</h2>
                <button class="btn btn-primary" onclick="addAccount()">+ Tambah Akun</button>
                <div id="accountsList" style="margin-top: 20px;"></div>
            </div>
            
            <div class="panel">
                <h2>👥 Manajemen Kontak</h2>
                <div class="contact-form">
                    <input type="text" id="contactName" placeholder="Nama Kontak">
                    <input type="text" id="contactNumber" placeholder="Nomor (dengan kode negara, contoh: 628123456789)">
                    <input type="number" id="contactPriority" placeholder="Prioritas (1-5)" min="1" max="5" value="1">
                    <button class="btn btn-primary" onclick="addContact()">Tambah Kontak</button>
                </div>
                
                <div style="margin: 20px 0;">
                    <button class="btn btn-success" onclick="importContacts()">📂 Import CSV</button>
                    <small style="color: #666; margin-left: 10px;">Format: number,name,priority</small>
                </div>
                
                <h3>Daftar Kontak</h3>
                <div class="contacts-list" id="contactsList"></div>
            </div>
        </div>
        
        <div class="panel">
            <h2>📊 Log Aktivitas</h2>
            <div class="logs-container" id="logsContainer"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = '';
        let refreshInterval;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadAccounts();
            loadContacts();
            loadLogs();
            
            refreshInterval = setInterval(() => {
                loadStats();
                loadAccounts();
                loadLogs();
            }, 5000);
        });
        
        // API Calls
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('messagesSent').textContent = data.messagesSent;
                document.getElementById('totalContacts').textContent = data.totalContacts;
                document.getElementById('activeAccounts').textContent = data.activeAccounts;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const accounts = await res.json();
                renderAccounts(accounts);
            } catch (error) {
                console.error('Error loading accounts:', error);
            }
        }
        
        async function loadContacts() {
            try {
                const res = await fetch('/api/contacts');
                const contacts = await res.json();
                renderContacts(contacts);
            } catch (error) {
                console.error('Error loading contacts:', error);
            }
        }
        
        async function loadLogs() {
            try {
                const res = await fetch('/api/logs?limit=50');
                const logs = await res.json();
                renderLogs(logs);
            } catch (error) {
                console.error('Error loading logs:', error);
            }
        }
        
        async function addAccount() {
            const name = prompt('Masukkan nama untuk akun ini (opsional):');
            try {
                const res = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name || 'Akun ' + new Date().toLocaleTimeString() })
                });
                const data = await res.json();
                if (data.success) {
                    alert('Akun berhasil ditambahkan! Scan QR code yang muncul.');
                    loadAccounts();
                }
            } catch (error) {
                alert('Gagal menambah akun: ' + error.message);
            }
        }
        
        async function addContact() {
            const name = document.getElementById('contactName').value;
            const number = document.getElementById('contactNumber').value;
            const priority = document.getElementById('contactPriority').value;
            
            if (!number) {
                alert('Nomor harus diisi!');
                return;
            }
            
            try {
                const res = await fetch('/api/contacts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, number, priority })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('contactName').value = '';
                    document.getElementById('contactNumber').value = '';
                    loadContacts();
                    loadStats();
                }
            } catch (error) {
                alert('Gagal menambah kontak: ' + error.message);
            }
        }
        
        async function importContacts() {
            if (!confirm('Import kontak dari file CSV? Pastikan file ada di data/contacts.csv')) {
                return;
            }
            
            try {
                const res = await fetch('/api/contacts/import', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert(`Berhasil import ${data.count} kontak!`);
                    loadContacts();
                    loadStats();
                }
            } catch (error) {
                alert('Gagal import kontak: ' + error.message);
            }
        }
        
        async function removeAccount(accountId) {
            if (!confirm('Yakin ingin menghapus akun ini?')) return;
            
            try {
                await fetch(`/api/accounts/${accountId}`, { method: 'DELETE' });
                loadAccounts();
            } catch (error) {
                alert('Gagal menghapus akun: ' + error.message);
            }
        }
        
        async function warmupAction(accountId, action) {
            try {
                await fetch(`/api/warmup/${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId })
                });
                loadAccounts();
            } catch (error) {
                alert(`Gagal ${action} warmup: ` + error.message);
            }
        }
        
        // Render functions
        function renderAccounts(accounts) {
            const container = document.getElementById('accountsList');
            
            if (accounts.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">Belum ada akun. Klik "Tambah Akun" untuk memulai.</p>';
                return;
            }
            
            container.innerHTML = accounts.map(acc => `
                <div class="account-card">
                    <div class="account-header">
                        <span class="account-name">${acc.name}</span>
                        <span class="status ${acc.connected ? 'connected' : 'disconnected'}">
                            ${acc.connected ? '● Terhubung' : '○ Tidak Terhubung'}
                        </span>
                    </div>
                    
                    ${acc.qr ? `
                        <div class="qr-container">
                            <p style="margin-bottom: 10px;">Scan QR Code dengan WhatsApp:</p>
                            <div class="qr-code" id="qr-${acc.id}">Loading QR...</div>
                        </div>
                    ` : ''}
                    
                    <div style="margin-top: 10px;">
                        <small>Pesan terkirim: ${acc.stats.messagesSent || 0}</small>
                        ${acc.stats.failures ? `<small style="margin-left: 15px; color: #e53e3e;">Gagal: ${acc.stats.failures}</small>` : ''}
                    </div>
                    
                    <div class="control-buttons">
                        ${acc.connected ? `
                            <button class="btn btn-success" onclick="warmupAction('${acc.id}', 'start')">▶ Mulai Warm-Up</button>
                            <button class="btn btn-primary" onclick="warmupAction('${acc.id}', 'pause')">⏸ Pause</button>
                        ` : ''}
                        <button class="btn btn-danger" onclick="removeAccount('${acc.id}')">🗑 Hapus</button>
                    </div>
                </div>
            `).join('');
            
            // Load QR codes
            accounts.forEach(acc => {
                if (acc.qr) {
                    loadQRCode(acc.id);
                }
            });
        }
        
        async function loadQRCode(accountId) {
            try {
                const res = await fetch(`/api/qr/${accountId}`);
                const data = await res.json();
                if (data.qr) {
                    const qrElement = document.getElementById(`qr-${accountId}`);
                    if (qrElement) {
                        // Convert QR string to ASCII art style
                        qrElement.textContent = data.qr;
                    }
                }
            } catch (error) {
                console.error('Error loading QR:', error);
            }
        }
        
        function renderContacts(contacts) {
            const container = document.getElementById('contactsList');
            
            if (contacts.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">Belum ada kontak. Tambah kontak untuk memulai.</p>';
                return;
            }
            
            container.innerHTML = contacts.map(contact => `
                <div class="contact-item">
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-number">${contact.number}</div>
                        ${contact.lastContact ? `<small>Terakhir: ${new Date(contact.lastContact).toLocaleString()}</small>` : ''}
                    </div>
                    <div>
                        <span class="badge ${contact.replied ? 'replied' : 'pending'}">
                            ${contact.replied ? '✓ Sudah Balas' : '⏳ Belum Balas'}
                        </span>
                        <span style="margin-left: 10px; font-size: 0.85em;">
                            Prioritas: ${contact.priority} | Pesan: ${contact.messageCount}
                        </span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderLogs(logs) {
            const container = document.getElementById('logsContainer');
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="log-entry">Belum ada log aktivitas</div>';
                return;
            }
            
            container.innerHTML = logs.reverse().map(log => {
                const time = new Date(log.timestamp).toLocaleTimeString();
                const logClass = `log-${log.type}`;
                return `
                    <div class="log-entry">
                        <span class="log-time">[${time}]</span>
                        <span class="${logClass}">[${log.type.toUpperCase()}]</span>
                        <span>${log.accountId}: ${log.message}</span>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
